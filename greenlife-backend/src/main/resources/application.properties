spring.application.name=greenlife-backend

# Database connection
# Set DB_URL, DB_USERNAME, DB_PASSWORD as OS environment variables in production
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=GreenLife;encrypt=false;loginTimeout=10;connectRetryCount=1;connectRetryInterval=1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:sa}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hikari Connection Pool Settings (Timeout Hardening for Local Stability)
# Prevents stale SQL Server socket connections and long DB stalls. Safe for local/dev runtime.
spring.datasource.hikari.pool-name=GreenLifeHikariPool
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
# Leak detection: log stack trace of any connection held longer than 3 seconds (Phase 4-J6: lowered from 5000)
spring.datasource.hikari.leak-detection-threshold=3000

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=none
# Disable SQL logging in production — set SHOW_SQL=true to enable locally
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false

# Phase 4-J6: Enable Hikari DEBUG logging to expose pool exhaustion causes at runtime.
# This only applies when there is a connection leak or pool starvation event.
# Remove or set to INFO after confirming pool stability.
logging.level.com.zaxxer.hikari=DEBUG

# JWT Settings — set GREENLIFE_JWT_SECRET as OS environment variable in production
# Default below is the dev-only Base64 key; MUST be replaced before production deployment
greenlife.jwt.secret=${GREENLIFE_JWT_SECRET:477265656e4c6966655365637265744b6579466f7254657377696e674a777441757468656e7469636174696f6e3230323631323334353637383930}
# 15 minutes expiration (in milliseconds: 900000)
greenlife.jwt.expiration=900000

# Cookie Settings
app.cookie.secure=${COOKIE_SECURE:false}

# VNPay Settings — set VNPAY_TMN_CODE and VNPAY_HASH_SECRET as environment variables in production
vnpay.tmn-code=${VNPAY_TMN_CODE:DUMMY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET:DUMMY_HASH_SECRET}
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/payment/vnpay-callback}

# File Upload Settings
greenlife.upload.dir=${UPLOAD_DIR:./uploads}

# Mail Server Configurations
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT Reset Secret — set GREENLIFE_JWT_RESET_SECRET as OS environment variable in production
greenlife.jwt.reset-secret=${GREENLIFE_JWT_RESET_SECRET:477265656e4c6966655365637265744b6579466f7254657377696e674a777441757468656e7469636174696f6e3230323631323334353637383930}

# Google OAuth Client ID — set GOOGLE_CLIENT_ID as OS environment variable in production
greenlife.google.client-id=${GOOGLE_CLIENT_ID:}

# PayOS Settings
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.return-url=${PAYOS_RETURN_URL:http://localhost:3000/payment/success}
payos.cancel-url=${PAYOS_CANCEL_URL:http://localhost:3000/payment/cancel}
payos.webhook-url=${PAYOS_WEBHOOK_URL:http://localhost:8080/api/payments/payos/webhook}

# ─── Redis Settings ────────────────────────────────────────────────────────────
# Redis is OPTIONAL for local development.
# If Redis is not installed, the JWT blacklist falls back to an in-memory cache.
# Set REDIS_HOST / REDIS_PORT env vars to connect to a real Redis in production.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# Short timeouts ensure fast fail-over when Redis is not running locally.
# All values in milliseconds.
spring.data.redis.timeout=500ms
spring.data.redis.lettuce.pool.enabled=false
spring.data.redis.lettuce.shutdown-timeout=100ms
# Connect timeout for the Lettuce socket (must be Duration string or ms integer)
spring.data.redis.connect-timeout=500ms

# JWT blacklist circuit-breaker — how long (ms) to stay in in-memory mode
# after a Redis failure before retrying.  Default: 30 s.
# Decrease for faster Redis recovery detection; increase to reduce retry noise.
app.security.redis-fallback-cooldown-ms=${REDIS_FALLBACK_COOLDOWN_MS:30000}
