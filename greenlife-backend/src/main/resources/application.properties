spring.application.name=greenlife-backend

# Database connection
# Set DB_URL, DB_USERNAME, DB_PASSWORD as OS environment variables in production
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=GreenLife;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:sa}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=none
# Disable SQL logging in production — set SHOW_SQL=true to enable locally
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false

# JWT Settings — set GREENLIFE_JWT_SECRET as OS environment variable in production
# Default below is the dev-only Base64 key; MUST be replaced before production deployment
greenlife.jwt.secret=${GREENLIFE_JWT_SECRET:477265656e4c6966655365637265744b6579466f7254657377696e674a777441757468656e7469636174696f6e3230323631323334353637383930}
# 15 minutes expiration (in milliseconds: 900000)
greenlife.jwt.expiration=900000

# Cookie Settings
app.cookie.secure=${COOKIE_SECURE:false}

# VNPay Settings — set VNPAY_TMN_CODE and VNPAY_HASH_SECRET as environment variables in production
vnpay.tmn-code=${VNPAY_TMN_CODE:DUMMY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET:DUMMY_HASH_SECRET}
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/payment/vnpay-callback}

# File Upload Settings
greenlife.upload.dir=${UPLOAD_DIR:./uploads}

# Mail Server Configurations
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT Reset Secret — set GREENLIFE_JWT_RESET_SECRET as OS environment variable in production
greenlife.jwt.reset-secret=${GREENLIFE_JWT_RESET_SECRET:477265656e4c6966655365637265744b6579466f7254657377696e674a777441757468656e7469636174696f6e3230323631323334353637383930}

# Google OAuth Client ID — set GOOGLE_CLIENT_ID as OS environment variable in production
greenlife.google.client-id=${GOOGLE_CLIENT_ID:}
