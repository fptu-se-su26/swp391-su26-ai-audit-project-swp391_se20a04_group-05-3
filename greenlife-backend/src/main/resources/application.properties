spring.application.name=greenlife-backend

# Database connection
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=GreenLife;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=sa
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Settings (Base64-encoded secret key: GreenLifeSecretKeyForTestingJwtAuthentication20261234567890)
greenlife.jwt.secret=477265656e4c6966655365637265744b6579466f7254657377696e674a777441757468656e7469636174696f6e3230323631323334353637383930
# 15 minutes expiration (in milliseconds: 900000)
greenlife.jwt.expiration=900000

# Cookie Settings
app.cookie.secure=false

# VNPay Settings
vnpay.tmn-code=DUMMY_TMN_CODE
vnpay.hash-secret=DUMMY_HASH_SECRET
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=http://localhost:8080/api/payment/vnpay-callback

# File Upload Settings
greenlife.upload.dir=./uploads


